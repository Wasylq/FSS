name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    name: Test and build binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test -race -count=1 ./...

      - name: Build binaries
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          COMMIT="${GITHUB_SHA::8}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}"
          mkdir -p dist

          platforms=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
          )

          for platform in "${platforms[@]}"; do
            GOOS="${platform%/*}"
            GOARCH="${platform#*/}"
            binary="fss"
            archive="fss-${VERSION}-${GOOS}-${GOARCH}"

            if [ "$GOOS" = "windows" ]; then
              binary="fss.exe"
            fi

            echo "Building ${GOOS}/${GOARCH}..."
            GOOS=$GOOS GOARCH=$GOARCH go build -ldflags "$LDFLAGS" -o "dist/${binary}" .

            cd dist
            if [ "$GOOS" = "windows" ]; then
              zip "${archive}.zip" "${binary}"
            else
              tar czf "${archive}.tar.gz" "${binary}"
            fi
            rm "${binary}"
            cd ..
          done

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: dist/
          retention-days: 7

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    # Pauses here until a reviewer of the `release-gate` environment approves.
    # See CONTRIBUTING.md → "Cutting a release" for the manual checklist
    # (notably: integration smoke tests that CI cannot run).
    environment:
      name: release-gate
      url: ${{ github.server_url }}/${{ github.repository }}/blob/master/CONTRIBUTING.md#cutting-a-release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pre-release reminder
        run: |
          echo "::notice title=Manual checks confirmed::Approver attests they have run the release checklist (integration smoke tests, changelog review)."

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-binaries
          path: dist/

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --oneline --no-merges)
          else
            CHANGELOG=$(git log --oneline --no-merges "${PREV_TAG}..HEAD")
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## Changes

            ${{ steps.changelog.outputs.changelog }}

            ## Installation

            Download the binary for your platform, extract, and place it on your PATH:

            ```sh
            # Linux (amd64)
            tar xzf fss-${{ github.ref_name }}-linux-amd64.tar.gz
            chmod +x fss
            ./fss --version

            # macOS (Apple Silicon)
            tar xzf fss-${{ github.ref_name }}-darwin-arm64.tar.gz
            chmod +x fss
            ./fss --version
            ```

            Or build from source:
            ```sh
            go install github.com/Wasylq/FSS@${{ github.ref_name }}
            ```

            Or pull the Docker image:
            ```sh
            docker pull ghcr.io/wasylq/fss:${{ github.ref_name }}
            ```
