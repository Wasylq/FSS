name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What's the current pain point?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should this work? CLI flags, expected output, etc.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about and why they're worse.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Scraper (existing site)
        - Scraper (new site)
        - Stash integration
        - Storage / output
        - CLI / config
        - Other
